<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sezgi — AI Fortune & Tarot</title>
  <meta name="description" content="Open in the Sezgi app, or download from Google Play.">
  <link rel="icon" href="data:,">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Space Grotesk', sans-serif;
      background: #0A0A0F;
      color: #E8E8F0;
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
      position: relative;
    }
    body::before {
      content: '';
      position: absolute;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0, 240, 255, 0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    .container {
      text-align: center;
      max-width: 360px;
      position: relative;
      z-index: 1;
    }
    .eye {
      width: 56px;
      height: 56px;
      margin: 0 auto 28px;
      border: 1.5px solid rgba(0, 240, 255, 0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 24px rgba(0, 240, 255, 0.15);
    }
    .eye::after {
      content: '';
      width: 12px;
      height: 12px;
      background: #00F0FF;
      border-radius: 50%;
      box-shadow: 0 0 12px rgba(0, 240, 255, 0.8);
    }
    h1 {
      font-size: 2rem;
      letter-spacing: 0.04em;
      font-weight: 500;
      margin-bottom: 8px;
      color: #E8E8F0;
    }
    .subtitle {
      color: #6E7080;
      font-size: 0.9rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    p.body {
      color: #9A9CA8;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .btn {
      display: inline-block;
      padding: 14px 28px;
      background: #00F0FF;
      color: #0A0A0F;
      text-decoration: none;
      border-radius: 4px;
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: opacity 0.2s;
      box-shadow: 0 0 24px rgba(0, 240, 255, 0.2);
    }
    .btn:hover { opacity: 0.85; }
    .btn-secondary {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 20px;
      color: #6E7080;
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
    }
    .btn-secondary:hover { color: #9A9CA8; }
    footer {
      position: absolute;
      bottom: 24px;
      color: #4A4C58;
      font-size: 0.75rem;
      letter-spacing: 0.04em;
    }
    .hint { margin-top: 24px; color: #4A4C58; font-size: 0.8rem; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="container">
    <div class="eye" aria-hidden="true"></div>
    <h1>SEZGI</h1>
    <p class="subtitle">AI Fortune Readings</p>
    <p class="body" id="message">Open this link inside the Sezgi app, or install it to continue.</p>
    <a class="btn" id="cta" href="https://play.google.com/store/apps/details?id=com.yinyangstudio.kismet">Get on Google Play</a>
    <p class="hint" id="hint"></p>
  </div>
  <footer>&copy; 2026 Yin&amp;Yang Studio</footer>

  <script>
    // App Links + custom scheme bounce.
    //
    // Android with app installed: this page never loads — the OS routes
    //   the App Link directly into the app via the verified assetlinks.json.
    // Android without app: this page loads → CTA goes to Play Store.
    //   We also try `sezgi://` once on first load, harmless when not handled.
    // iOS / Desktop: this page loads → message explains Android-only for now.
    //
    // Path mapping mirrors lib/core/utils/deep_link.dart:
    //   /kismet-pages/open               → sezgi:///       (home)
    //   /kismet-pages/open?ref=ABC       → sezgi:///?ref=ABC (referral)
    //   /kismet-pages/open/burc/koc      → sezgi:///burc/koc (horoscope)
    //   /kismet-pages/open/<fortune>     → sezgi:///<fortune>
    (function() {
      var ua = navigator.userAgent.toLowerCase();
      var isAndroid = /android/.test(ua);
      var isIOS = /iphone|ipad|ipod/.test(ua) && !window.MSStream;

      var path = window.location.pathname.replace(/^\/kismet-pages\/open/, '');
      var query = window.location.search; // includes leading "?" or empty
      var appUrl = 'sezgi://' + path.replace(/^\//, '') + query;

      var storeUrl = 'https://play.google.com/store/apps/details?id=com.yinyangstudio.kismet';
      var cta = document.getElementById('cta');
      var message = document.getElementById('message');
      var hint = document.getElementById('hint');

      if (isAndroid) {
        // Try the custom scheme once. If the app handled it, the page
        // unloads and the user lands inside the reading. If not, the
        // CTA below remains tappable for Play Store install.
        try { window.location.replace(appUrl); } catch (_) {}
        message.textContent = 'Sezgi did not open. Tap below to install.';
        hint.textContent = 'Already installed? Open the app, then return to this link.';
      } else if (isIOS) {
        message.textContent = 'Sezgi is currently available on Android. iOS is on the way.';
        cta.style.display = 'none';
        hint.textContent = 'Bookmark this page — we will notify when iOS lands.';
      } else {
        message.textContent = 'Sezgi runs on Android. Open this link on your phone to continue.';
        hint.textContent = '';
      }
    })();
  </script>
</body>
</html>
